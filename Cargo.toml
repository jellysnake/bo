[package]
name = "link-stash"
version = "0.1.0"
edition = "2021"

[lib]
name = "link_stash"
path = "src/lib.rs"

[dependencies]
trafilatura = { version = "0.3", features = ["markdown"] }
reqwest = { version = "0.12", features = ["blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
